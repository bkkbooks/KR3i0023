body:
  text: 總叙焙名北苑諸焙或還民間或𨽻北苑前書未盡今始終其事舊記建安郡官焙三十有八自南唐歳率六縣民採造大為民間所苦我宋建隆已来環北苑近焙歳取上供外焙俱還民間而裁稅之至道年中始分㳺坑臨江汾常西濛洲西小豐大熟六焙𨽻南劔又免五縣茶民專以建安一縣民力裁足之而除其口率泉慶厯中取蘓口曽坑石坑重院還屬北苑焉又丁氏舊録云官私之焙千三百三十有六而獨記官焙三十二東山之焙十有四北苑龍焙一乳橘内焙二乳橘外焙三重院四壑嶺五謂源六范源七蘓口八東宫九石坑十建溪十一香口十二火梨十三開山十四南溪之焙十有二下瞿一濛洲東二汾東三南溪四斯源五小香六際會七謝坑八沙龍九南鄉十中瞿十一黄熟十二西溪之焙四慈善西一慈善東二慈惠三船坑四北山之焙二慈善東一豐樂二北苑曽坑石坑附建溪之焙三十有二北苑首其一而園别為二十五苦竹園頭甲之鼯䑕窠次之張坑頭又次之苦竹園頭連屬窠坑在大山之北園植北山之陽大山多修木叢林鬱廕相及自焙口逹源頭五里地逺而益髙以園多苦竹故名曰苦竹以髙逺居衆山之首故曰園頭直西定山之隈土石廻向如窠然南挾泉流積隂之處而多飛䑕故曰鼯䑕窠其下曰小苦竹園又西至於大園絶山尾踈竹蓊翳昔多飛雉故曰雞藪窠又南出壌園麥園言其土壤沃宜麰麥也自青山曲折而北嶺勢屬如貫魚凡十有二又隈曲如窠巢者九其地利為九窠十二壠隈深絶數里曰廟坑坑有山神祠焉又焙南直東嶺極髙峻曰教練壠東入張坑南距苦竹帶北岡勢横直故曰坑坑又北出鳯凰山其勢中跱如鳯之首兩山相向如鳯之翼因取象焉鳯凰山東南至於袁雲壠又南至於張坑又南最髙處曰張坑頭言昔有袁氏張氏居於此因名其地焉出袁雲之北平下故曰平園絶嶺之表曰西際其東為東際焙東之山縈紆如帶故曰帶園其中曰中歴坑東又曰馬鞍山又東黄淡窠謂山多黄淡也絶東為林園又南曰柢園又有蘇口焙與北苑不相屬昔有蘓氏居之其園别為四其最髙處曰曽坑際上又曰尼園又北曰官坑上園下坑園慶厯中始入北苑歳貢有曽坑上品一斤叢出於此曽坑山淺土薄苖發多紫復不肥乳氣味殊薄今歳貢以苦竹園茶充之而蔡公茶録亦不云曽坑者佳又石坑者渉溪東北距焙僅一舍諸焙絶下慶厯中分屬北苑園之别有十一曰大􅀢二曰石雞望三曰黄園四曰石坑古焙五曰重院六曰彭坑七曰蓮湖八曰嚴厯九曰烏石髙十曰髙尾山多古木修林今為本焙取材之所園焙歳乆今廢不開二焙非産茶之所今附見之壑源葉源附建安郡東望北苑之南山叢然而秀髙峙數百丈如郛郭焉民間所謂捍火山也其絶頂西南下視建之地邑民間謂之望州山山起壑源口而西周抱北苑之羣山迤􅆔南絶其尾巋然山阜髙者為壑源頭言壑源嶺山自此首也大山南北以限沙溪其東曰壑水之所出水出山之南東北合為建溪壑源口者在北苑之東北南徑數里有僧居曰承天有園隴北稅官山其茶甘香特勝近焙受水則渾然色重粥面無澤道山之南又西至於章厯章厯西曰後坑西曰連焙南曰焙山又南曰新宅又西曰嶺根言北山之根也茶多植山之陽其土赤埴其茶香少而黄白嶺根有流泉清淺可渉渉泉而南山勢回曲東去如鈎故其地謂之壑嶺坑頭茶為勝絶處又東别為大窠坑頭至大窠為正壑嶺實為南山土皆黒埴茶生山隂厥味甘香厥色青白及受水則淳淳光澤民間謂之冷粥面視其面渙散如粟雖去社芽葉過老色益青明氣益鬱然其止則苦去而甘至民間謂之草木大而味大是也他焙芽葉遇老色益青濁氣益勃然甘至則味去而苦留為異矣大窠之東山勢平盡曰壑嶺尾茶生其間色黄而味多土氣絶大窠南山其陽曰林坑又西南曰壑嶺根其西曰壑嶺頭道南山而東曰穿欄焙又東曰黄際其北曰李坑山漸平下茶色黄而味短自壑嶺尾之東南溪流繚遶岡阜不相連附極南塢中曰長坑踰嶺為葉源又東為梁坑而盡於下湖葉源者土赤多石茶生其中色多黄青無粥面粟紋而頗明爽復性重喜沉為次也佛嶺佛嶺連接葉源下湖之東而在北苑之東南隔壑源溪水道自章阪東際為丘坑坑口西對壑源亦曰壑口其茶黄白而味短東南曰曾坑今屬北苑其正東曰後厯曾坑之陽曰佛嶺又東至於張坑又東曰李坑又有硬頭後洋蘇池蘓源郭源南源畢源苦竹坑岐頭槎頭皆周環佛嶺之東南茶少甘而多苦色亦重濁又有篢源篢音膽未詳此字石門江源白沙皆在佛嶺之東北茶泛然縹塵色而不鮮明味短而香少為劣耳沙溪沙溪去北苑西十里山淺土薄茶生則葉細芽不肥乳自溪口諸焙色黄而土氣自龔漈南曰挺頭又西曰章坑又南曰永安西南曰南坑漈其西曰砰溪又有周坑范源温湯漈厄源黄坑石龜李坑章坑章村小梨皆屬沙溪茶大率氣味全薄其輕而浮浡浡如土色製造亦殊壑源者不多留膏盖以去膏盡則味少而無澤也茶之面無光澤也故多苦而少甘茶名茶之名類殊别故録之茶之名有七一曰白葉茶民間大重出於近歳園焙時有之地不以山川逺近發不以社之先後芽葉如紙民間以為茶瑞取其第一者為鬬茶而氣味殊薄非食茶之比今出壑源之大窠者六葉仲元葉世萬葉世榮葉勇葉世積葉相壑源巖下一葉務滋源頭二葉團葉肱壑源後坑葉久壑源嶺根三葉公葉品葉居林坑黄漈一㳺容丘坑一游用章畢源一王大照佛嶺尾一游道生沙溪之大梨漈上一謝汀髙石巖一雲摖院大梨一呂演砰溪嶺根一任道者次有柑葉茶樹髙丈餘徑頭七八寸葉厚而圓狀類柑橘之葉其芽發即肥乳長二寸許為食茶之上品三曰早茶亦類柑葉發常先春民間採製為試焙者四曰細葉茶葉比柑葉細薄樹髙者五六尺芽短而不乳今生沙溪山中盖土薄而不茂也五曰稽茶葉細而厚密芽晩而青黄六曰晩茶盖稽茶之類發比諸茶晩生於社後七曰叢茶亦曰蘖茶叢生髙不數尺一歳之間發者數四貧民取以為利採茶辨茶須知製造之始故次建溪茶比他郡最先北苑壑源者尤早歳多暖則先驚蟄十日即芽歳多寒則後驚蟄五日始發先芽者氣味俱不佳惟過驚蟄者最為第一民間常以驚蟄為候諸焙後北苑者半月去逺則益晩凡採茶必以晨興不以日出日出露晞為陽所薄則使芽之膏腴立耗於内茶反受水而不鮮明故常以早為最凡斷芽必以甲不以指以甲則速斷不柔以指則多温易損擇之必精濯之必潔蒸之必香火之必良一失其度俱為茶病民間常以春隂為採茶得時日出而採則芽葉易損建人謂之採摘不鮮是也茶病試茶辨味必須知茶之病故又次之芽擇肥乳則甘香而粥面着盞而不散土瘠而芽短則雲脚渙亂去盞而易散葉梗半則受水鮮白葉梗短則色黄而泛梗謂芽之身除去白合處茶民以茶之色味俱在梗中烏蔕白合茶之大病不去烏蔕則色黄黒而惡不去白合則味苦澁丁謂之論備矣蒸芽必熟去膏必盡蒸芽未熟則草木氣存適口則知去膏未盡則色濁而味重受煙則香奪壓黄則味失此皆茶之病也受煙謂過黄時火中有煙使茶香盡而煙臭不去也壓去膏之時乆留茶黄未造使黄經宿香味俱失弇然氣如假雞􅆑臭也東溪試茶録
