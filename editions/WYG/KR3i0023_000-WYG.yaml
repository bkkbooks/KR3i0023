front:
  text: 土决地茶味甲於諸焙丁謂亦云鳯山髙不百丈無危峰絶崦而崗阜環抱氣勢柔秀宜乎嘉植靈卉之所發也又以建安茶品甲於天下疑山川至靈之卉天地始和之氣盡此茶矣又論石乳出壑嶺斷崖缺石之間盖草木之仙骨丁謂之記録建溪茶事詳備矣至於品載止云北苑壑源嶺及總記官私諸焙千三百三十六耳近蔡公亦云惟北苑鳯凰山連屬諸焙所産者味佳故四方以建茶為目皆曰北苑建人以近山所得故謂之壑源好者亦取壑源口南諸葉皆云彌珍絶傳致之間識者以色味品第反以壑源為疑今書所異者從二公紀土地勝絶之目具䟽園隴百名之異香味精麤之别庶知茶於草木為靈最矣去畆歩之間别移其性又以佛嶺葉源沙溪附見以質二焙之羙故曰東溪試茶録自東宫西溪南焙北苑皆不足品第今略而不論
